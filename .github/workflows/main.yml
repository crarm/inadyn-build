name: Build inadyn IPK for OpenWrt

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        required: true
        default: '18.06.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build inadyn
        run: |
          # 下载并解压 SDK
          SDK_URL="https://archive.openwrt.org/releases/18.06.0/targets/armvirt/32/openwrt-sdk-18.06.0-armvirt-32_gcc-7.3.0_musl_eabi.Linux-x86_64.tar.xz"
          wget $SDK_URL
          tar -xf openwrt-sdk-*.tar.xz
          cd openwrt-sdk-*/
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install inadyn
          
          # 配置编译
          echo "CONFIG_PACKAGE_inadyn=y" > .config
          make defconfig
          
          # 编译
          make package/inadyn/compile V=s
          
          # 查找生成的 IPK
          find bin/ -name "inadyn*.ipk" -exec cp {} /tmp/ \;
      
      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: inadyn-ipk
          path: /tmp/inadyn*.ipk
